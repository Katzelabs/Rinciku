<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160" role="img">
  <title>Rinciku — stacked lockup</title>
  <desc>Rinciku stacked logo lockup — mark centered above wordmark and tagline</desc>
  <defs>
    <radialGradient id="rk-g" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#26261C"/>
      <stop offset="100%" stop-color="#131310"/>
    </radialGradient>
  </defs>
  <!-- Mark, centered -->
  <g transform="translate(60 0) scale(0.8)">
    <rect width="100" height="100" rx="25" fill="url(#rk-g)"/>
    <path d="M 41 68.4 V 46.9 Q 41 38.7 49.2 38.7 H 54.7" fill="none" stroke="#FBFBF9" stroke-width="10.2" stroke-linecap="round"/>
    <circle cx="65.2" cy="63.3" r="5.1" fill="#9AE600"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="114"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="600"
    letter-spacing="-0.6"
    fill="#0C0C09">rinciku</text>
  <!-- Tagline -->
  <text x="100" y="132"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11"
    letter-spacing="1"
    fill="#6B6B5C">my financial details</text>
</svg>
