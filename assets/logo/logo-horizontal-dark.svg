<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img">
  <title>Rinciku — horizontal lockup (dark)</title>
  <desc>Rinciku horizontal logo lockup on dark background — mark on the left, light wordmark and tagline on the right</desc>
  <defs>
    <radialGradient id="rk-g" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#26261C"/>
      <stop offset="100%" stop-color="#131310"/>
    </radialGradient>
  </defs>
  <!-- Mark -->
  <g transform="translate(0 4) scale(0.64)">
    <rect width="100" height="100" rx="25" fill="url(#rk-g)"/>
    <path d="M 41 68.4 V 46.9 Q 41 38.7 49.2 38.7 H 54.7" fill="none" stroke="#FBFBF9" stroke-width="10.2" stroke-linecap="round"/>
    <circle cx="65.2" cy="63.3" r="5.1" fill="#9AE600"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="46"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="32"
    font-weight="600"
    letter-spacing="-0.6"
    fill="#FBFBF9">rinciku</text>
  <!-- Tagline -->
  <text x="81" y="62"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11"
    letter-spacing="1"
    fill="#A6A695">my financial details</text>
</svg>
