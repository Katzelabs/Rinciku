<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img">
  <title>Rinciku — horizontal lockup</title>
  <desc>Rinciku horizontal logo lockup — mark on the left, wordmark and tagline on the right</desc>
  <!-- Mark -->
  <rect x="0" y="4" width="64" height="64" rx="16" fill="#4a7a42"/>
  <rect x="10" y="21" width="44" height="9" rx="4.5" fill="#ffffff" opacity="0.93"/>
  <rect x="10" y="34" width="31" height="9" rx="4.5" fill="#ffffff" opacity="0.65"/>
  <rect x="10" y="47" width="19" height="9" rx="4.5" fill="#ffffff" opacity="0.37"/>
  <!-- Wordmark -->
  <text x="80" y="46"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="32"
    font-weight="600"
    letter-spacing="-0.6"
    fill="#2e4e28">rinciku</text>
  <!-- Tagline -->
  <text x="81" y="62"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11"
    letter-spacing="1"
    fill="#8aaa80">my financial details</text>
</svg>
