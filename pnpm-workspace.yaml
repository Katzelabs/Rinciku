packages:
  - apps/*
  - packages/*

allowBuilds:
  msw: false

# Security pin: linkify-it <5.0.1 has a ReDoS (GHSA-22p9-wv53-3rq4), pulled in
# as ^2.x by markdown-it@10 (react-native-markdown-display). 5.x verified
# compatible with markdown-it@10. Must live HERE — pnpm >=10 ignores the old
# package.json#pnpm.overrides location.
overrides:
  linkify-it: ^5.0.2

# Android fix: react-native-screens NativeTabs `hidden` sets the bottom bar to
# GONE but leaves its laid-out frame, which RN's TouchTargetHelper (frame-only,
# ignores visibility) keeps hit-testing — every React touch in the bar's strip
# dies (the AI chat composer's send/attach buttons). The patch zeroes the bar's
# frame while hidden. Re-check on react-native-screens upgrades.
patchedDependencies:
  react-native-screens@4.25.2: patches/react-native-screens@4.25.2.patch
